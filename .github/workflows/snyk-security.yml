# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up Snyk to analyze the full Snyk platform (Snyk Open Source, Snyk Code,
# Snyk Container and Snyk Infrastructure as Code)
# The setup installs the Snyk CLI - for more details on the possible commands
# check https://docs.snyk.io/snyk-cli/cli-reference
# The results of Snyk Code are then uploaded to GitHub Security Code Scanning
#
# In order to use the Snyk Action you will need to have a Snyk API token.
# More details in https://github.com/snyk/actions#getting-your-snyk-token
# or you can signup for free at https://snyk.io/login
#
# For more examples, including how to limit scans to only high-severity issues
# and fail PR checks, see https://github.com/snyk/actions/

name: Snyk Security

# Trigger on push/PR to main and dev branches, or manually
on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

# Minimal default permissions
permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read           # required for actions/checkout to fetch code
      security-events: write   # required for github/codeql-action/upload-sarif to upload SARIF results
      actions: read            # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Set up Node.js - must match the application's required version
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Snyk CLI
      # More details: https://github.com/snyk/actions#getting-your-snyk-token
      # Sign up for free at https://snyk.io/login
      - name: Set up Snyk CLI
        uses: snyk/actions/setup@v1

      # Run Snyk to check for vulnerabilities
      # continue-on-error ensures SARIF upload runs even if vulnerabilities are found
      # For more examples, including how to limit scans to only high-severity issues
      # and fail PR checks, see https://github.com/snyk/actions/
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@v1
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif

      # Upload Snyk results to GitHub Security Code Scanning tab
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
